<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="360" fill="#ffffff"/>

  <!-- Step 1 -->
  <rect x="20" y="40" width="170" height="70" rx="10" fill="#eef3fb" stroke="#2c5fa8" stroke-width="2"/>
  <text x="105" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">n points =</text>
  <text x="105" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">n singleton</text>
  <text x="105" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">clusters</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="75" x2="240" y2="75" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="240" y="40" width="180" height="70" rx="10" fill="#eef3fb" stroke="#2c5fa8" stroke-width="2"/>
  <text x="330" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">Compute pairwise</text>
  <text x="330" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">distance matrix</text>
  <text x="330" y="103" text-anchor="middle" font-size="11" fill="#5a6b7a">(距離行列)</text>

  <!-- Arrow 2 -->
  <line x1="420" y1="75" x2="470" y2="75" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="470" y="40" width="190" height="70" rx="10" fill="#fdf1e3" stroke="#c97b1a" stroke-width="2"/>
  <text x="565" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">Merge the closest</text>
  <text x="565" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">pair (linkage rule</text>
  <text x="565" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">decides "closest")</text>

  <!-- Arrow down from step 3 -->
  <line x1="565" y1="110" x2="565" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="470" y="155" width="190" height="65" rx="10" fill="#eef3fb" stroke="#2c5fa8" stroke-width="2"/>
  <text x="565" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">Update distance</text>
  <text x="565" y="198" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">matrix (n-1 clusters)</text>

  <!-- Arrow left from step 4 to decision -->
  <line x1="470" y1="187" x2="300" y2="187" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="190,150 300,187 190,224 80,187" fill="#fff7d6" stroke="#a8862c" stroke-width="2"/>
  <text x="190" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#1c2b39">More than 1</text>
  <text x="190" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#1c2b39">cluster left?</text>

  <!-- Loop back arrow: Yes -->
  <path d="M190,150 L190,75 L240,75" fill="none" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="115" font-size="11" fill="#3a7d3a" font-weight="bold">Yes</text>

  <!-- No -> final -->
  <line x1="190" y1="224" x2="190" y2="280" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="255" font-size="11" fill="#b03030" font-weight="bold">No</text>

  <rect x="60" y="280" width="260" height="60" rx="10" fill="#e9f7ec" stroke="#2c8a4a" stroke-width="2"/>
  <text x="190" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#1c2b39">Full dendrogram built</text>
  <text x="190" y="323" text-anchor="middle" font-size="11" fill="#5a6b7a">cut at any height to get k clusters</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
</svg>
